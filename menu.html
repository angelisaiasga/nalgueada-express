<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Nalgueada Express</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #005691; color: #FFFFFF; padding: 0; }
        
        /* Encabezado de Identidad */
        .user-header {
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #FDB813;
        }
        .user-header p { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .user-header h3 { color: #FDB813; font-size: 1.3rem; margin: 5px 0; }
        .user-header span { font-size: 0.9rem; background: #003d66; padding: 2px 10px; border-radius: 10px; }

        .content { padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="user-header">
        <p>Cliente Registrado</p>
        <h3 id="display-name">...</h3>
        <span id="display-phone">...</span>
    </div>

    <div class="content">
        <h2>Bienvenido a la Flota</h2>
        <p style="margin-top: 20px; opacity: 0.7;">Selecciona tus productos abajo.</p>
    </div>

    <script>
        // Lógica de recuperación de sesión
        const nombre = localStorage.getItem('cliente_nombre');
        const whatsapp = localStorage.getItem('cliente_whatsapp');

        if (nombre && whatsapp) {
            document.getElementById('display-name').innerText = nombre;
            document.getElementById('display-phone').innerText = `📞 ${whatsapp}`;
        } else {
            // Protección de ruta: Si no hay registro, lo regresamos
            window.location.replace('registro.html');
        }
    </script>
</body>
</html>
