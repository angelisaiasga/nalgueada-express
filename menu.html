<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado - v2.2.7 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #005691; color: #FFFFFF; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Encabezado con datos del cliente */
        .header-status { width: 100%; text-align: center; margin-bottom: 40px; }
        .header-status p { font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px; }
        .header-status h2 { color: #FDB813; font-size: 1.8rem; }
        .whatsapp-tag { display: inline-block; margin-top: 10px; padding: 5px 15px; background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.8rem; }

        /* Contenedor de Botones Originales */
        .btn-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        
        .main-button { width: 100%; padding: 18px; border-radius: 50px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; text-decoration: none; text-align: center; transition: 0.3s; font-size: 1.1rem; }
        
        .btn-pide { background: #FDB813; color: #000; box-shadow: 0 4px 15px rgba(252, 184, 19, 0.3); }
        .btn-mas { background: #FFFFFF; color: #005691; }
        .btn-fiesta { background: #FFFFFF; color: #005691; }

        .main-button:hover { transform: scale(1.03); opacity: 0.9; }

        .footer-actions { margin-top: 50px; }
        .btn-logout { background: none; border: none; color: #FF9494; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-status">
        <p>Haciendo pedido como</p>
        <h2 id="display-name">Identificando...</h2>
        <div class="whatsapp-tag" id="display-phone">---</div>
    </div>

    <div class="btn-container">
        <a href="catalogo.html" class="main-button btn-pide">PIDE HOY</a>
        <a href="promociones.html" class="main-button btn-mas">MAS MEJOR</a>
        <a href="fiesta.html" class="main-button btn-fiesta">¿PLANEAS UNA FIESTA?</a>
    </div>

    <div class="footer-actions">
        <button onclick="cerrarSesion()" class="btn-logout">CERRAR SESIÓN / CAMBIAR USUARIO</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('cliente_nombre');
            const whatsapp = localStorage.getItem('cliente_whatsapp');

            if (nombre && whatsapp) {
                document.getElementById('display-name').innerText = nombre;
                document.getElementById('display-phone').innerText = `📞 ${whatsapp}`;
            } else {
                window.location.replace('identificacion.html');
            }
        });

        function cerrarSesion() {
            if(confirm('¿Deseas cambiar de usuario?')) {
                localStorage.clear();
                window.location.replace('identificacion.html');
            }
        }
    </script>
</body>
</html>
