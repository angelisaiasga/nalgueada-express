<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Nalgueada Express</title>
    <style>
        :root { --azul: #005691; --amarillo: #FDB813; --blanco: #FFFFFF; --verde: #4BB543; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--azul); color: var(--blanco); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header-status { width: 100%; text-align: center; margin-bottom: 25px; }
        .header-status h2 { color: var(--amarillo); font-size: 1.8rem; margin-top: 5px; }

        /* Widget de Rastreo */
        #orderTracker { 
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); 
            border: 2px solid var(--amarillo); border-radius: 15px; padding: 15px; 
            margin-bottom: 20px; display: none; 
        }
        .tracker-title { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px; }
        .tracker-id { font-family: monospace; font-weight: bold; color: var(--amarillo); font-size: 1.1rem; }
        .tracker-status { margin-top: 10px; display: flex; align-items: center; gap: 10px; font-size: 1rem; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--amarillo); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .btn-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .main-button { width: 100%; padding: 18px; border-radius: 50px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; text-decoration: none; text-align: center; font-size: 1rem; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-pide { background: var(--amarillo); color: #000; }
        .btn-sec { background: #FFFFFF; color: var(--azul); }
        #btnIrCarrito { background: var(--verde); color: white; display: none; border: 2px solid white; }

        .btn-logout { margin-top: auto; padding: 20px; background: none; border: none; color: #FF9494; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-status">
        <p>Bienvenido,</p>
        <h2 id="display-name">Identificando...</h2>
    </div>

    <div id="orderTracker">
        <p class="tracker-title">Estatus de tu entrega:</p>
        <div class="tracker-id" id="trackerID">FOLIO: #---</div>
        <div class="tracker-status">
            <div id="trackerDot" class="status-dot"></div>
            <span id="trackerText">Verificando pedido...</span>
        </div>
    </div>

    <div class="btn-container">
        <a href="carritos.html" id="btnIrCarrito" class="main-button">🛒 TERMINAR MI COMPRA</a>
        <a href="catalogo.html" class="main-button btn-pide">VER CATÁLOGO / PEDIR</a>
        <a href="#" class="main-button btn-sec">PROMOCIONES</a>
        <a href="#" class="main-button btn-sec">EVENTOS</a>
    </div>

    <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'; 
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const nombre = localStorage.getItem('cliente_nombre');
        const whatsapp = localStorage.getItem('cliente_whatsapp');

        async function inicializarMenu() {
            if (!nombre || !whatsapp) {
                window.location.replace('identificacion.html');
                return;
            }
            document.getElementById('display-name').innerText = nombre;

            // Mostrar botón de carrito si hay algo guardado
            const carritoLocal = JSON.parse(localStorage.getItem('carrito')) || [];
            if (carritoLocal.length > 0) document.getElementById('btnIrCarrito').style.display = 'block';

            // Buscar pedido activo
            await buscarUltimoEstatus();
        }

        async function buscarUltimoEstatus() {
            try {
                // Buscamos solo el pedido más reciente que NO esté entregado
                const { data, error } = await supabaseClient
                    .from('pedidos')
                    .select('*')
                    .eq('whatsapp_cliente', whatsapp.trim())
                    .order('fecha_creacion', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const pedido = data[0];
                    
                    // Si el estatus es entregado, ocultamos el tracker
                    if (pedido.estatus.toLowerCase() === 'entregado') {
                        document.getElementById('orderTracker').style.display = 'none';
                    } else {
                        pintarEstatus(pedido);
                        suscribirRealtime(pedido.id);
                    }
                }
            } catch (err) {
                console.error("Error al sincronizar:", err);
            }
        }

        function pintarEstatus(pedido) {
            const tracker = document.getElementById('orderTracker');
            const trackerText = document.getElementById('trackerText');
            const trackerID = document.getElementById('trackerID');
            const dot = document.getElementById('trackerDot');

            // Normalización para evitar fallos por mayúsculas o espacios
            const est = (pedido.estatus || 'pendiente').toLowerCase().trim();

            const mapaMensajes = {
                'pendiente': 'Estamos preparando tu pedido...',
                'atendido': '¡Tu pedido ya está en Bodega! ✅',
                'en_ruta': '¡La Peugeot Partner va en camino! 🚚'
            };

            const mapaColores = {
                'pendiente': '#FDB813', // Amarillo
                'atendido': '#4BB543',  // Verde
                'en_ruta': '#FFFFFF'    // Blanco
            };

            tracker.style.display = 'block';
            trackerID.innerText = `FOLIO: #${pedido.id.toString().slice(-8)}`;
            trackerText.innerText = mapaMensajes[est] || 'Procesando entrega...';
            if (dot) dot.style.backgroundColor = mapaColores[est] || '#FDB813';
        }

        function suscribirRealtime(pedidoId) {
            // Eliminamos canales previos para evitar duplicidad al recargar
            supabaseClient.removeAllChannels();

            supabaseClient
                .channel('cambios-estatus-cliente')
                .on('postgres_changes', 
                    { event: 'UPDATE', schema: 'public', table: 'pedidos', filter: `id=eq.${pedidoId}` }, 
                    (payload) => {
                        console.log("Cambio detectado en tiempo real:", payload.new.estatus);
                        pintarEstatus(payload.new);
                    }
                )
                .subscribe();
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.replace('identificacion.html');
        }

        // Inicio
        inicializarMenu();
    </script>
</body>
</html>
