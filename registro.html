<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado v1.6 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body {
            background-color: #005691;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 400px; width: 100%; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h2 { margin-bottom: 25px; font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.9; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            background-color: #FFFFFF;
            color: #005691;
        }

        .btn-geo {
            background-color: #A0D8F1;
            color: #005691;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-weight: bold;
        }

        .btn-enviar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #FDB813;
            color: #000;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-enviar:disabled { background-color: #666; cursor: not-allowed; opacity: 0.7; }

        #status-geo { font-size: 0.75rem; margin-top: 5px; color: #A0D8F1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Logo" class="logo">
        <h2>Únete a la flota</h2>
        
        <form id="registroForm">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej. Roberto Diaz" required>
            </div>

            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="55 1234 5678" required>
            </div>

            <div class="form-group">
                <label>Dirección (Calle y No.)</label>
                <input type="text" id="direccion" placeholder="Calle central #12..." required>
                <button type="button" class="btn-geo" onclick="obtenerUbicacion()">📍 Fijar mi ubicación GPS</button>
                <p id="status-geo"></p>
                <input type="hidden" id="coords">
            </div>

            <button type="submit" id="btnFinalizar" class="btn-enviar">Finalizar Registro</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN DE INGENIERÍA v1.6.0
        const SUPABASE_URL = 'https://jvvboqhppybuiiwvfvlr.supabase.co';
        // USA LA LLAVE LARGA (Legacy Anon) que empieza con eyJ...
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2dmJvcWhwcHlidWlpd3ZmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQxMjg2MDgsImV4cCI6MjA1OTcwNDYwOH0.VfR_A1_M8_N1_Z_Y_Z_Y_Z_Y_Z_Y_Z_Y_Z_Y_Z_Y_Z_Y'; 

        // Inicialización optimizada para evitar bloqueos de CORS
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false,
                detectSessionInUrl: false
            }
        });

        function obtenerUbicacion() {
            const status = document.getElementById('status-geo');
            if (!navigator.geolocation) {
                status.innerText = "Geolocalización no soportada";
                return;
            }
            status.innerText = "Localizando...";
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                // Formato de link directo para la Partner
                document.getElementById('coords').value = `https://www.google.com/maps?q=${lat},${lon}`;
                status.innerText = "✅ Ubicación fijada correctamente";
            }, (err) => {
                console.error(err);
                status.innerText = "❌ Error al obtener GPS. Activa tu ubicación.";
            });
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnFinalizar');
            const statusGeo = document.getElementById('status-geo').innerText;

            // Validación básica de GPS
            if (!document.getElementById('coords').value) {
                alert("Por favor, fija tu ubicación GPS antes de continuar.");
                return;
            }

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const payload = { 
                nombre: document.getElementById('nombre').value, 
                whatsapp: document.getElementById('whatsapp').value, 
                direccion: document.getElementById('direccion').value, 
                referencia: document.getElementById('coords').value 
            };

            try {
                const { data, error } = await _supabase
                    .from('clientes')
                    .insert([payload]);

                if (error) throw error;

                alert("¡Bienvenido a Nalgueada Express!");
                window.location.href = 'menu.html';

            } catch (err) {
                console.error("Fallo de red:", err);
                
                // PLAN DE RESPALDO (Fallback)
                alert("El servidor está saturado. Se enviará tu registro vía WhatsApp.");
                const msj = `*NUEVO REGISTRO*\nNombre: ${payload.nombre}\nWhatsApp: ${payload.whatsapp}\nDirección: ${payload.direccion}\nMapa: ${payload.referencia}`;
                window.open(`https://wa.me/525588052053?text=${encodeURIComponent(msj)}`, '_blank');
                
                btn.innerText = "Finalizar Registro";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
