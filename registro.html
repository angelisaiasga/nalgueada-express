<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado - Ingeniería de Software */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body {
            background-color: #005691;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 400px; width: 100%; text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h2 { margin-bottom: 25px; font-weight: 600; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.9; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background: #FFFFFF;
            color: #005691;
        }

        .btn-geo {
            background: #A0D8F1;
            color: #005691;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 8px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-weight: bold;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: #FDB813;
            color: #000;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 25px;
            border: none;
            cursor: pointer;
        }

        .btn-submit:disabled { background: #666; cursor: wait; }

        #geo-status { font-size: 0.75rem; margin-top: 5px; font-weight: bold; }
        .success-text { color: #4BB543; }
        .error-text { color: #FF9494; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Nalgueada Express" class="logo">
        <h2>Registro de Cliente</h2>
        
        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp (10 dígitos)</label>
                <input type="tel" id="whatsapp" required>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección de Entrega</label>
                <input type="text" id="direccion" required>
                <button type="button" class="btn-geo" onclick="getGPS()">📍 Capturar Coordenadas GPS</button>
                <p id="geo-status"></p>
                <input type="hidden" id="coords">
            </div>

            <button type="submit" id="btnMain" class="btn-submit">Finalizar Registro</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CLIENT CONFIGURATION
        const S_URL = 'https://jvvboqhppybuiiwvfvlr.supabase.co';
        // REEMPLAZA CON TU KEY LARGA (eyJ...)
        const S_KEY = 'TU_LLAVE_LARGA_AQUI'; 

        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        async function getGPS() {
            const status = document.getElementById('geo-status');
            if (!navigator.geolocation) {
                status.innerHTML = '<span class="error-text">GPS no soportado</span>';
                return;
            }
            status.innerText = "Localizando dispositivo...";
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                // Formato de link directo para la Partner
                document.getElementById('coords').value = `https://www.google.com/maps?q=${lat},${lon}`;
                status.innerHTML = '<span class="success-text">✅ Ubicación capturada</span>';
            }, (err) => {
                status.innerHTML = '<span class="error-text">❌ Error GPS: Activa tu ubicación</span>';
            });
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMain');
            
            if (!document.getElementById('coords').value) {
                alert("Es obligatorio capturar la ubicación GPS.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO CON SERVIDOR...";

            const row = {
                nombre: document.getElementById('nombre').value,
                whatsapp: document.getElementById('whatsapp').value,
                direccion: document.getElementById('direccion').value,
                referencia: document.getElementById('coords').value
            };

            const { data, error } = await supabaseClient
                .from('clientes')
                .insert([row]);

            if (error) {
                console.error("DB Error:", error);
                alert(`Error de Persistencia (${error.code}): ${error.message}`);
                btn.disabled = false;
                btn.innerText = "Finalizar
