<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado - v2.2.2 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #005691; color: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        h2 { margin-bottom: 10px; font-weight: 600; color: #FDB813; }
        p.subtitle { margin-bottom: 25px; font-size: 0.9rem; opacity: 0.8; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.9; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; background: #FFFFFF; color: #005691; }
        .btn-submit { display: block; width: 100%; padding: 15px; background: #FDB813; color: #000; border-radius: 50px; font-weight: bold; text-transform: uppercase; margin-top: 25px; border: none; cursor: pointer; transition: all 0.3s ease; }
        .btn-submit:hover { transform: scale(1.02); background: #ffc439; }
        .btn-submit:disabled { background: #666; cursor: wait; opacity: 0.7; }
        #status-log { font-size: 0.8rem; margin-top: 15px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Nalgueada Express" class="logo">
        <h2 id="ver-check">Registro Oficial de la Flota</h2>
        <p class="subtitle">Sincronización directa con Supabase Cloud.</p>
        
        <form id="registroForm">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Roberto Diaz" required>
            </div>
            <div class="form-group">
                <label>WhatsApp (10 dígitos)</label>
                <input type="tel" id="whatsapp" placeholder="5512345678" maxlength="10" required>
            </div>
            <div class="form-group">
                <label>Dirección de Entrega</label>
                <input type="text" id="direccion" placeholder="Calle, número y colonia" required>
            </div>
            <button type="submit" id="btnMain" class="btn-submit">Finalizar Registro</button>
            <p id="status-log"></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN v2.2.2
        const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co'.trim();
        // PEGA TU LLAVE eyJ... AQUÍ:
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'.trim(); 

        const supabaseClient = supabase.createClient(S_URL, S_KEY, {
            auth: { persistSession: false }
        });

        function getCoords() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve("GPS_NO_SOPORTADO"); return; }
                const timeout = setTimeout(() => resolve("GPS_TIMEOUT"), 5000);
                navigator.geolocation.getCurrentPosition(
                    (pos) => { clearTimeout(timeout); resolve(`${pos.coords.latitude},${pos.coords.longitude}`); },
                    (err) => { clearTimeout(timeout); resolve("GPS_DENEGADO"); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMain');
            const statusLog = document.getElementById('status-log');
            
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";
            statusLog.innerHTML = '<span style="color: #A0D8F1;">📡 Estableciendo handshake seguro...</span>';

            try {
                const coords = await getCoords();
                const payload = {
                    nombre: document.getElementById('nombre').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    direccion: document.getElementById('direccion').value,
                    referencia: `https://www.google.com/maps?q=${coords}`
                };

                const { error } = await supabaseClient
                    .from('clientes')
                    .insert([payload]);

                if (error) throw error;

                localStorage.setItem('cliente_nombre', payload.nombre);
                localStorage.setItem('cliente_whatsapp', payload.whatsapp);

                statusLog.innerHTML = '<span style="color: #4BB543;">✅ ¡Registrado! Entrando al menú...</span>';
                setTimeout(() => window.location.replace('menu.html'), 1000);

            } catch (err) {
                console.error("DETALLE TÉCNICO:", err);
                btn.disabled = false;
                btn.innerText = "Finalizar Registro";
                statusLog.innerHTML = `<span style="color: #FF9494;">❌ Error ${err.code || '401'}: ${err.message || 'Key Inválida'}</span>`;
            }
        });
    </script>
</body>
</html>
