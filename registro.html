<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado - v1.8.2 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body {
            background-color: #005691;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 400px; width: 100%; text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h2 { margin-bottom: 10px; font-weight: 600; }
        p.subtitle { margin-bottom: 25px; font-size: 0.9rem; opacity: 0.8; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.9; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background: #FFFFFF;
            color: #005691;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: #FDB813;
            color: #000;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 25px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:disabled { background: #666; cursor: wait; }

        #status-log { font-size: 0.8rem; margin-top: 15px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Nalgueada Express" class="logo">
        <h2>Registro de Cliente</h2>
        <p class="subtitle">Sincronización directa con base de datos segura.</p>
        
        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Roberto Diaz" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">WhatsApp (10 dígitos)</label>
                <input type="tel" id="whatsapp" placeholder="5512345678" required>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección de Entrega</label>
                <input type="text" id="direccion" placeholder="Calle, número y colonia" required>
            </div>

            <button type="submit" id="btnMain" class="btn-submit">Finalizar Registro</button>
            <p id="status-log"></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const S_URL = 'https://jvvboqhppybuiiwvfvlr.supabase.co';
        // ASEGÚRATE DE PEGAR TU LLAVE eyJ... AQUÍ
        const S_KEY = 'TU_LLAVE_LARGA_AQUI'; 

        // Configuración de Cliente v1.8.2: Sin persistencia de sesión para evitar bloqueos
        const supabaseClient = supabase.createClient(S_URL, S_KEY, {
            auth: { persistSession: false }
        });

        const statusLog = document.getElementById('status-log');

        function getCoords() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject("GPS_NOT_SUPPORTED");
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`${pos.coords.latitude},${pos.coords.longitude}`),
                    (err) => reject("GPS_DENIED")
                );
            });
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMain');
            
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";
            statusLog.innerHTML = '<span style="color: #A0D8F1;">📡 Capturando GPS...</span>';

            try {
                // 1. GPS Automático
                const coords = await getCoords();
                const mapsLink = `https://www.google.com/maps?q=${coords}`;
                
                statusLog.innerText = "💾 Guardando en el servidor...";

                // 2. Data Payload
                const row = {
                    nombre: document.getElementById('nombre').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    direccion: document.getElementById('direccion').value,
                    referencia: mapsLink
                };

                // 3. Inserción Directa
                const { error } = await supabaseClient
                    .from('clientes')
                    .insert([row]);

                if (error) throw error;

                // Éxito
                statusLog.innerHTML = '<span style="color: #4BB543;">✅ Guardado exitosamente. Redirigiendo...</span>';
                setTimeout(() => window.location.href = 'menu.html', 1500);

            } catch (err) {
                console.error("Error técnico detallado:", err);
                btn.disabled = false;
                btn.innerText = "Finalizar Registro";
                
                if (err === "GPS_DENIED") {
                    statusLog.innerHTML = '<span style="color: #FF9494;">⚠️ Activa el GPS para registrarte.</span>';
                } else {
                    // Muestra el código de error de Supabase si existe
                    const errorMsg = err.message || "Fallo de conexión";
                    statusLog.innerHTML = `<span style="color: #FF9494;">❌ Error: ${errorMsg}</span>`;
                }
            }
        });
    </script>
</body>
</html>
