<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Logística - Nalgueada Express</title>
    <style>
        :root { --azul: #005691; --amarillo: #FDB813; --blanco: #FFFFFF; --gris: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gris); color: #333; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--azul); padding-bottom: 10px; }
        
        /* Estilo de Tarjetas */
        .pedido-card { 
            background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 8px solid #ccc;
        }
        .status-pendiente { border-left-color: #ff4d4d; }
        .status-atendido { border-left-color: #FFA500; }
        .status-en_ruta { border-left-color: #4BB543; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .badge-pendiente { background: #ffebeb; color: #ff4d4d; }
        .badge-atendido { background: #fff5e6; color: #FFA500; }
        .badge-en_ruta { background: #ebfaeb; color: #4BB543; }

        .btn-accion { 
            width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; color: white;
        }
        .btn-atender { background-color: #FFA500; }
        .btn-rutear { background-color: #4BB543; }
        .btn-entregar { background-color: var(--azul); }

        /* Estilos de Error en Pantalla */
        .error-box { background: #fff1f0; border: 1px solid #ffa39e; padding: 20px; border-radius: 10px; color: #cf1322; text-align: center; }
        .loader { text-align: center; padding: 40px; color: var(--azul); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2>📦 Gestión de Pedidos</h2>
        <p>Control de estados - Peugeot Partner</p>
    </header>

    <div id="listaPedidos">
        <div class="loader">Intentando conectar con Supabase...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURACIÓN CENTRALIZADA
        const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co'.trim();
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'.trim(); // <--- PEGA TU KEY AQUÍ
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        async function cargarPedidos() {
            const container = document.getElementById('listaPedidos');
            
            try {
                // CONSULTA SIMPLE: Sin filtros complejos ni ordenamientos para evitar errores 400/42703
                const { data: pedidos, error, status } = await supabaseClient
                    .from('pedidos')
                    .select('*');

                if (error) {
                    container.innerHTML = `
                        <div class="error-box">
                            <h3>❌ Error de Conexión</h3>
                            <p>${error.message}</p>
                            <p><small>Código HTTP: ${status}</small></p>
                        </div>`;
                    return;
                }

                // Filtrado y Ordenamiento en el Cliente (JavaScript)
                const activos = pedidos
                    .filter(p => ['pendiente', 'atendido', 'en_ruta'].includes(p.estatus))
                    .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

                if (activos.length === 0) {
                    container.innerHTML = '<div class="loader">✅ No hay pedidos activos por entregar.</div>';
                    return;
                }

                container.innerHTML = '';
                activos.forEach(p => {
                    const card = document.createElement('div');
                    card.className = `pedido-card status-${p.estatus}`;
                    
                    let botonHTML = '';
                    if (p.estatus === 'pendiente') {
                        botonHTML = `<button class="btn-accion btn-atender" onclick="cambiarEstatus('${p.id}', 'atendido')">Marcar como Atendido</button>`;
                    } else if (p.estatus === 'atendido') {
                        botonHTML = `<button class="btn-accion btn-rutear" onclick="cambiarEstatus('${p.id}', 'en_ruta')">Enviar a Ruta 🚚</button>`;
                    } else if (p.estatus === 'en_ruta') {
                        botonHTML = `<button class="btn-accion btn-entregar" onclick="cambiarEstatus('${p.id}', 'entregado')">Finalizar Entrega ✅</button>`;
                    }

                    card.innerHTML = `
                        <div class="badge badge-${p.estatus}">${p.estatus}</div>
                        <div class="info-cliente">
                            <b>${p.nombre_cliente}</b>
                            <p>📱 WhatsApp: ${p.whatsapp_cliente}</p>
                            <p>💰 Total: $${p.total_venta}</p>
                        </div>
                        ${botonHTML}
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                container.innerHTML = `<div class="error-box"><h3>💥 Fallo Crítico</h3><p>${err.message}</p></div>`;
            }
        }

        async function cambiarEstatus(id, nuevoEstatus) {
            if (!confirm(`¿Mover pedido a ${nuevoEstatus.toUpperCase()}?`)) return;

            try {
                const { error } = await supabaseClient
                    .from('pedidos')
                    .update({ estatus: nuevoEstatus })
                    .eq('id', id);

                if (error) throw error;
                cargarPedidos();
            } catch (err) {
                alert("Error al actualizar: " + err.message);
            }
        }

        // Inicio
        cargarPedidos();
    </script>
</body>
</html>
