<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Nalgueada Express</title>
    <style>
        :root { --azul: #005691; --amarillo: #FDB813; --blanco: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--azul); color: var(--blanco); padding: 20px; }

        /* Switch de Vista */
        .view-controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .btn-view { background: rgba(255,255,255,0.1); border: 1px solid var(--blanco); color: white; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-view.active { background: var(--amarillo); color: black; border-color: var(--amarillo); }

        /* Contenedor Maestro */
        .productos-container { display: grid; gap: 15px; }

        /* --- ESTILO 1: INDIVIDUAL (LISTA) --- */
        .view-list { grid-template-columns: 1fr; }
        .view-list .prod-card { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .view-list .prod-img { width: 80px; height: 80px; border-radius: 10px; margin-right: 15px; object-fit: cover; }
        .view-list .prod-info { flex-grow: 1; }

        /* --- ESTILO 2: CAJAS (GRID) --- */
        .view-grid { grid-template-columns: 1fr 1fr; }
        .view-grid .prod-card { display: flex; flex-direction: column; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .view-grid .prod-img { width: 100%; height: 120px; border-radius: 10px; margin-bottom: 10px; object-fit: cover; }

        /* Elementos Comunes */
        .prod-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        .prod-price { color: var(--amarillo); font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: var(--amarillo); border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="view-controls">
        <button class="btn-view active" onclick="changeView('list', this)">Lista</button>
        <button class="btn-view" onclick="changeView('grid', this)">Cajas</button>
    </div>

    <div id="catalog" class="productos-container view-list">
        <div class="prod-card">
            <img src="https://via.placeholder.com/150" class="prod-img" alt="Producto">
            <div class="prod-info">
                <div class="prod-name">Nalgueada Clásica</div>
                <div class="prod-price">$85.00</div>
                <button class="btn-add">AGREGAR +</button>
            </div>
        </div>

        <div class="prod-card">
            <img src="https://via.placeholder.com/150" class="prod-img" alt="Producto">
            <div class="prod-info">
                <div class="prod-name">Nalgueada con Queso</div>
                <div class="prod-price">$95.00</div>
                <button class="btn-add">AGREGAR +</button>
            </div>
        </div>
    </div>

    <script>
        function changeView(type, btn) {
            const container = document.getElementById('catalog');
            const buttons = document.querySelectorAll('.btn-view');
            
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(type === 'grid') {
                container.classList.remove('view-list');
                container.classList.add('view-grid');
            } else {
                container.classList.remove('view-grid');
                container.classList.add('view-list');
            }
        }
    </script>
</body>
</html>
