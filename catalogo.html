<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Pro - Nalgueada Express</title>
    <style>
        :root { --azul: #005691; --amarillo: #FDB813; --blanco: #FFFFFF; --rojo: #FF9494; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--azul); color: var(--blanco); padding: 20px; padding-bottom: 100px; }

        /* Header y Controles */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .view-toggle button { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .view-toggle button.active { background: var(--amarillo); color: black; border-color: var(--amarillo); }

        /* Contenedor dinámico */
        #catalog { display: grid; gap: 15px; }
        .grid-view { grid-template-columns: 1fr 1fr; }
        .list-view { grid-template-columns: 1fr; }

        /* Card de Producto */
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 140px; object-fit: cover; background: #004575; }
        .card-body { padding: 12px; }
        .card-title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        
        /* Selector de Tipo de Venta (Individual vs Caja) */
        .sale-type { display: flex; background: rgba(0,0,0,0.2); border-radius: 8px; margin: 10px 0; padding: 2px; }
        .sale-type label { flex: 1; text-align: center; font-size: 0.7rem; padding: 5px; cursor: pointer; border-radius: 6px; }
        .sale-type input { display: none; }
        .sale-type input:checked + span { background: var(--amarillo); color: black; display: block; border-radius: 4px; font-weight: bold; }

        .price-display { color: var(--amarillo); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .stock-tag { font-size: 0.65rem; opacity: 0.7; margin-bottom: 10px; display: block; }

        .btn-add { width: 100%; background: var(--amarillo); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add:disabled { background: #666; cursor: not-allowed; }

        /* Carrito Flotante (Footer) */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--amarillo); color: black; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Nuestros Productos</h3>
        <div class="view-toggle">
            <button id="btnList" class="active" onclick="setView('list')">☰</button>
            <button id="btnGrid" onclick="setView('grid')">▦</button>
        </div>
    </div>

    <div id="catalog" class="list-view">
        <p id="loading">Sincronizando existencias...</p>
    </div>

    <div id="cartBar" class="cart-bar" style="display: none;" onclick="window.location.href='carrito.html'">
        <span>🛒 <span id="cartCount">0</span> artículos</span>
        <span>VER PEDIDO ></span>
    </div>
