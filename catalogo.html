<script>
    const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'.trim(); // ASEGÚRATE DE PEGAR LA LLAVE AQUÍ

    const supabaseClient = supabase.createClient(S_URL, S_KEY, {
        auth: { persistSession: false }
    });

    let productos = [];
    let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

    async function cargarCatalogo() {
        console.log("🚀 Iniciando carga de catálogo...");
        const statusMsg = document.getElementById('loading');
        
        try {
            const { data, error } = await supabaseClient
                .from('productos')
                .select('*')
                .eq('activo', true);

            if (error) {
                console.error("❌ Error de Supabase:", error);
                statusMsg.innerText = "Error de conexión: " + error.message;
                return;
            }

            console.log("📦 Datos recibidos:", data);

            if (!data || data.length === 0) {
                console.warn("⚠️ Tabla vacía o sin productos activos.");
                statusMsg.innerText = "No hay productos disponibles por ahora.";
                return;
            }

            productos = data;
            renderizar();
            actualizarBarraCarrito();
            
        } catch (err) {
            console.error("💥 Error crítico de ejecución:", err);
            statusMsg.innerText = "Fallo en el script. Revisa la consola.";
        }
    }

    function renderizar() {
        const container = document.getElementById('catalog');
        container.innerHTML = ''; // Limpiamos el mensaje de carga

        productos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${p.imagen_url || 'https://via.placeholder.com/300x140?text=Nalgueada'}" alt="${p.nombre}">
                <div class="card-body">
                    <div class="card-title">${p.nombre}</div>
                    <span class="stock-tag">Disponibles: ${p.stock_total_piezas} piezas</span>
                    <div class="sale-type">
                        <label>
                            <input type="radio" name="type-${p.id}" value="unit" checked onchange="updatePrice('${p.id}', ${p.precio_individual})">
                            <span>Individual</span>
                        </label>
                        <label>
                            <input type="radio" name="type-${p.id}" value="box" onchange="updatePrice('${p.id}', ${p.precio_caja})">
                            <span>Caja</span>
                        </label>
                    </div>
                    <div class="price-display" id="price-${p.id}">$${p.precio_individual}</div>
                    <button class="btn-add" onclick="agregarAlCarrito('${p.id}')">AGREGAR +</button>
                </div>
            `;
            container.appendChild(card);
        });
        console.log("🎨 Renderizado completado.");
    }

    // ... (Mantén las funciones de updatePrice, agregarAlCarrito y actualizarBarraCarrito) ...

    window.onload = cargarCatalogo; // Forzamos ejecución al cargar ventana
</script>
