<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalgueada Express - Inicio</title>
    <style>
        /* ADN Visual Unificado - v2.0.0 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body {
            background-color: #005691;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 400px; width: 100%; }
        
        .logo { 
            max-width: 180px; 
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 1rem; opacity: 0.9; margin-bottom: 40px; }

        /* Estilo de Botonera */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
            cursor: pointer;
            border: none;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background-color: #FFFFFF;
            color: #005691;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background-color: #FDB813;
            color: #000000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Nalgueada Express" class="logo">
        
        <h1>¡Qué onda!</h1>
        <p>Dinos quién eres para empezar el servicio:</p>

        <div class="btn-group">
            <a href="identificacion.html" class="btn btn-secondary">Ya soy cliente</a>

            <a href="registro.html" class="btn btn-primary">Regístrame</a>
        </div>

        <p class="footer-text">Del refri a tu puerta en minutos.</p>
    </div>

</body>
</html>
