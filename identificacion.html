<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificación - Nalgueada Express</title>
    <style>
        /* ADN Visual Unificado - v2.2.4 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #005691; color: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 25px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        h2 { margin-bottom: 10px; font-weight: 600; font-size: 1.8rem; }
        p.subtitle { margin-bottom: 30px; font-size: 0.9rem; opacity: 0.8; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid transparent; font-size: 1.1rem; background: #FFFFFF; color: #005691; text-align: center; font-weight: bold; transition: 0.3s; }
        input:focus { border-color: #FDB813; outline: none; }

        .btn-search { display: block; width: 100%; padding: 15px; background: #FDB813; color: #000; border-radius: 50px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-search:hover { transform: translateY(-2px); background: #ffc439; }
        .btn-search:disabled { background: #666; opacity: 0.7; cursor: wait; }

        #status-log { margin-top: 20px; font-size: 0.9rem; font-weight: bold; min-height: 1.2em; }
        .link-registro { margin-top: 25px; display: block; color: #A0D8F1; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Logo" class="logo">
        <h2>¡Hola de nuevo!</h2>
        <p class="subtitle">Ingresa tu WhatsApp para continuar.</p>
        
        <form id="identificarseForm">
            <div class="input-group">
                <input type="tel" id="whatsapp" placeholder="5588052053" maxlength="10" required>
            </div>
            <button type="submit" id="btnMain" class="btn-search">Buscar Cliente</button>
            <p id="status-log"></p>
        </form>

        <a href="registro.html" class="link-registro">No tengo cuenta, quiero registrarme</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURACIÓN v2.2.4 - SYNC TOTAL
        const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co';
        // PEGA AQUÍ LA MISMA LLAVE eyJ... QUE USASTE EN REGISTRO.HTML
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'.trim(); 

const supabaseClient = supabase.createClient(S_URL, S_KEY, {
    auth: {
        persistSession: false, // OBLIGATORIO para evitar el 401 por sesión vieja
        autoRefreshToken: false,
        detectSessionInUrl: false
    }
});
        document.getElementById('identificarseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMain');
            const statusLog = document.getElementById('status-log');
            const whatsappInput = document.getElementById('whatsapp').value;
            
            btn.disabled = true;
            statusLog.innerHTML = '🔍 Buscando en la base...';

            try {
                // Consulta directa a Supabase
                const { data, error } = await supabaseClient
                    .from('clientes')
                    .select('nombre, whatsapp')
                    .eq('whatsapp', whatsappInput)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') { // No se encontró el registro
                        statusLog.innerHTML = '❌ Número no registrado.';
                    } else {
                        throw error;
                    }
                    btn.disabled = false;
                    return;
                }

                // ÉXITO: Guardamos sesión local y entramos
                localStorage.setItem('cliente_nombre', data.nombre);
                localStorage.setItem('cliente_whatsapp', data.whatsapp);

                statusLog.innerHTML = `<span style="color: #4BB543;">✅ ¡Bienvenido, ${data.nombre}!</span>`;
                
                setTimeout(() => {
                    window.location.replace('menu.html');
                }, 1000);

            } catch (err) {
                console.error("DEBUG IDENTIFICACION:", err);
                btn.disabled = false;
                // Si sale 401 aquí, es que la S_KEY sigue mal en este archivo
                statusLog.innerHTML = `<span style="color: #FF9494;">⚠️ Error ${err.code || '401'}: Credenciales inválidas.</span>`;
            }
        });
    </script>
</body>
</html>
