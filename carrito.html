<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificación - Nalgueada Express</title>
    <style>
        /* Mantenemos el ADN visual de la v1.1 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #005691; /* Azul Nalgueada Unificado */
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .logo {
            max-width: 180px; /* Un poco más pequeño para dar espacio al texto */
            height: auto;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .instrucciones {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .menu-opciones {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            background-color: #FFFFFF;
            color: #005691;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }

        .btn:active { transform: scale(0.98); }

        /* Estilo para "Ya soy cliente" (Destacado) */
        .btn-cliente {
            background-color: #FDB813; /* Amarillo Cheve */
            color: #000000;
        }

        /* Botón de regreso discreto */
        .btn-volver {
            margin-top: 30px;
            display: inline-block;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_nalgueada_solid.png" alt="Logo Nalgueada Express" class="logo">
        
        <h2>¡Qué onda!</h2>
        <p class="instrucciones">Para que tu cheve llegue bien fría, dinos quién eres:</p>

        <div class="menu-opciones">
            <a href="#" class="btn btn-cliente">Ya soy cliente</a>
            
            <a href="#" class="btn">Regístrame</a>
        </div>

        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </div>

</body>
</html>
