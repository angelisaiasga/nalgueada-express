<div id="areaResumen" style="display: none;">
    <div class="resumen">
        <div class="total-row">
            <span>Total:</span>
            <span id="txtTotal">$0.00</span>
        </div>
        <button id="btnFinalizarPedido" class="btn-confirmar" onclick="enviarASistema()">
            CONFIRMAR Y REGISTRAR PEDIDO
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dmJvcWhwcHlidWlpdndmdmxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTgyMTksImV4cCI6MjA5MTIzNDIxOX0.7Q44qXe73r7y2AAlJ997jakXJ7xVrgqDynMOZ6huyok'.trim(); 
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

    // ... (Funciones renderCarrito y eliminar se mantienen igual) ...

    async function enviarASistema() {
        const btn = document.getElementById('btnFinalizarPedido');
        
        // Bloqueo total para evitar doble clic
        btn.disabled = true;
        btn.innerText = "💾 GUARDANDO EN BASE DE DATOS...";

        const nombre = localStorage.getItem('cliente_nombre');
        const whatsapp = localStorage.getItem('cliente_whatsapp');

        if (!whatsapp) {
            alert("Sesión expirada. Por favor identifícate de nuevo.");
            window.location.replace('identificacion.html');
            return;
        }

        try {
            const totalVenta = carrito.reduce((acc, item) => acc + parseFloat(item.precio), 0);
            
            // 1. Registro del encabezado del pedido
            const { data: pedido, error: errorPedido } = await supabaseClient
                .from('pedidos')
                .insert([{
                    whatsapp_cliente: whatsapp,
                    nombre_cliente: nombre,
                    total_venta: totalVenta,
                    estatus: 'pendiente'
                }])
                .select()
                .single();

            if (errorPedido) throw errorPedido;

            // 2. Registro de cada artículo del carrito
            const detalles = carrito.map(item => ({
                pedido_id: pedido.id,
                producto_id: item.id,
                cantidad_pedida: 1,
                es_caja: item.esCaja,
                precio_unitario_aplicado: item.precio,
                subtotal: item.precio
            }));

            const { error: errorDetalles } = await supabaseClient
                .from('detalle_pedidos')
                .insert(detalles);

            if (errorDetalles) throw errorDetalles;

            // 3. ÉXITO: Limpiar y Redirigir
            localStorage.removeItem('carrito');
            
            alert(`✅ ¡Pedido registrado!\nFolio: ${pedido.id.slice(0,8)}`);
            window.location.replace('menu.html');

        } catch (err) {
            console.error("CRITICAL ERROR:", err);
            alert("Error de conexión con el servidor. Reintenta.");
            btn.disabled = false;
            btn.innerText = "REINTENTAR REGISTRO";
        }
    }
    
    renderCarrito();
</script>
