<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Nalgueada Express</title>
    <style>
        :root { --azul: #005691; --amarillo: #FDB813; --blanco: #FFFFFF; --rojo: #ff4d4d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--azul); color: var(--blanco); padding: 20px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }

        .item-carrito { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .item-info { flex-grow: 1; }
        .item-nombre { font-weight: bold; }
        .item-detalle { font-size: 0.75rem; opacity: 0.8; color: var(--amarillo); }
        .btn-remove { background: none; border: none; color: var(--rojo); font-weight: bold; cursor: pointer; padding: 10px; }

        .resumen { margin-top: 30px; border-top: 2px solid var(--amarillo); padding-top: 20px; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; }

        .btn-confirmar { width: 100%; background: var(--amarillo); color: black; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-confirmar:disabled { background: #666; opacity: 0.7; cursor: not-allowed; }
        .empty-msg { text-align: center; margin-top: 50px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header">
        <a href="catalogo.html" class="btn-back"> < Volver</a>
        <h2>Tu Pedido</h2>
    </div>

    <div id="listaCarrito"></div>

    <div id="areaResumen" style="display: none;">
        <div class="resumen">
            <div class="total-row">
                <span>Total:</span>
                <span id="txtTotal">$0.00</span>
            </div>
            <button id="btnFinalizar" class="btn-confirmar" onclick="confirmarPedido()">FINALIZAR Y ENVIAR PEDIDO</button>
        </div>
    </div>

    <div id="carritoVacio" class="empty-msg" style="display: none;">
        <p>Tu carrito está vacío.</p>
        <br>
        <a href="catalogo.html" style="color: var(--amarillo)">Ver catálogo</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const S_URL = 'https://jyvboqhppybuiivwfvlr.supabase.co';
        const S_KEY = 'TU_ANON_KEY_AQUI'.trim(); 
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        function renderCarrito() {
            const listaDiv = document.getElementById('listaCarrito');
            const resumenDiv = document.getElementById('areaResumen');
            const vacioDiv = document.getElementById('carritoVacio');

            if (carrito.length === 0) {
                listaDiv.innerHTML = '';
                resumenDiv.style.display = 'none';
                vacioDiv.style.display = 'block';
                return;
            }

            vacioDiv.style.display = 'none';
            resumenDiv.style.display = 'block';
            listaDiv.innerHTML = '';

            let total = 0;
            carrito.forEach((item, index) => {
                total += parseFloat(item.precio);
                const div = document.createElement('div');
                div.className = 'item-carrito';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-nombre">${item.nombre}</div>
                        <div class="item-detalle">${item.esCaja ? '📦 Pack/Caja' : '単品 Individual'} - $${item.precio}</div>
                    </div>
                    <button class="btn-remove" onclick="eliminar(${index})">✕</button>
                `;
                listaDiv.appendChild(div);
            });

            document.getElementById('txtTotal').innerText = `$${total.toFixed(2)}`;
        }

        function eliminar(index) {
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            renderCarrito();
        }

        async function confirmarPedido() {
            const btn = document.getElementById('btnFinalizar');
            btn.disabled = true;
            btn.innerText = "REGISTRANDO EN SISTEMA...";

            // Recuperar datos de sesión guardados anteriormente
            const nombre = localStorage.getItem('cliente_nombre');
            const whatsapp = localStorage.getItem('cliente_whatsapp');

            try {
                const totalVenta = carrito.reduce((acc, item) => acc + parseFloat(item.precio), 0);
                
                // 1. Insertar el Pedido (Header)
                const { data: pedido, error: errorPedido } = await supabaseClient
                    .from('pedidos')
                    .insert([{
                        whatsapp_cliente: whatsapp,
                        nombre_cliente: nombre,
                        total_venta: totalVenta,
                        estatus: 'pendiente'
                    }])
                    .select()
                    .single();

                if (errorPedido) throw errorPedido;

                // 2. Insertar Detalle de Pedido (Rows)
                const detalles = carrito.map(item => ({
                    pedido_id: pedido.id,
                    producto_id: item.id,
                    cantidad_pedida: 1,
                    es_caja: item.esCaja,
                    precio_unitario_aplicado: item.precio,
                    subtotal: item.precio
                }));

                const { error: errorDetalles } = await supabaseClient
                    .from('detalle_pedidos')
                    .insert(detalles);

                if (errorDetalles) throw errorDetalles;

                // 3. Éxito total
                localStorage.removeItem('carrito');
                alert(`¡Pedido registrado con éxito!\nFolio: ${pedido.id.slice(0,8)}\nEstatus: Pendiente de entrega.`);
                window.location.replace('menu.html');

            } catch (err) {
                console.error("Error transaccional:", err);
                alert("Error al procesar el pedido. Verifica tu conexión.");
                btn.disabled = false;
                btn.innerText = "FINALIZAR Y ENVIAR PEDIDO";
            }
        }

        renderCarrito();
    </script>
</body>
</html>
